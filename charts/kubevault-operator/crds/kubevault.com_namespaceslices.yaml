apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  labels:
    app.kubernetes.io/name: kubevault
  name: namespaceslices.kubevault.com
spec:
  group: kubevault.com
  names:
    categories:
    - vault
    - appscode
    - all
    kind: NamespaceSlice
    listKind: NamespaceSliceList
    plural: namespaceslices
    shortNames:
    - nss
    singular: namespaceslice
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.namespaceCount
      name: NamespaceCount
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha2
    schema:
      openAPIV3Schema:
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            properties:
              hubVaultRef:
                properties:
                  name:
                    type: string
                  namespace:
                    type: string
                required:
                - name
                type: object
              namespaces:
                items:
                  properties:
                    conditions:
                      properties:
                        ready:
                          type: boolean
                      type: object
                    externalID:
                      type: string
                    name:
                      type: string
                  required:
                  - name
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - name
                x-kubernetes-list-type: map
            type: object
          status:
            properties:
              namespaceCount:
                format: int32
                type: integer
              observedGeneration:
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
