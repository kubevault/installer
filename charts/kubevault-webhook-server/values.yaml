##
## KubeVault chart configuration
##
# Declare variables to be passed into your templates.

# Overrides name template
nameOverride: ""
# Overrides fullname template
fullnameOverride: ""
# Number of KubeVault webhook server replicas to create (only 1 is supported)
replicaCount: 1
# Docker registry fqdn used to pull docker images
# Set this to use docker registry hosted at ${registryFQDN}/${registry}/${image}
registryFQDN: ghcr.io
# Docker registry containing KubeVault images
server:
  # Docker registry used to pull KubeVault webhook server image
  registry: kubevault
  # KubeVault webhook server container image
  repository: vault-operator
  # KubeVault webhook server container image tag
  tag: ""
  # Security options this container should run with
  securityContext: # +doc-gen:break
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 65534
    seccompProfile:
      type: RuntimeDefault
  # Compute Resources required by the webhook server container
  resources: {}
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

# Specify an array of imagePullSecrets.
# Secrets must be manually created in the namespace.
#
# Example:
# helm template charts/kubevault-webhook-server \
#   --set imagePullSecrets[0].name=sec0 \
#   --set imagePullSecrets[1].name=sec1
imagePullSecrets: []
# Container image pull policy
imagePullPolicy: IfNotPresent
# If true, installs KubeVault operator as critical addon
criticalAddon: false
# PriorityClassName for the operator
priorityClassName: ""
# Log level for webhook server
logLevel: 3
# Annotations applied to webhook server deployment
annotations: {}
# Annotations passed to webhook server pod(s).
podAnnotations: {}
# Node labels for pod assignment
nodeSelector: # +doc-gen:break
  kubernetes.io/os: linux
# Tolerations for pod assignment
tolerations: []
# Affinity rules for pod assignment
affinity: {}
# Security options the webhook server pod should run with.
podSecurityContext: {}
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""
apiserver:
  # If true, mutating webhooks are registered for KubeVault CRDs.
  enableMutatingWebhook: true
  # If true, validating webhooks are registered for KubeVault CRDs.
  enableValidatingWebhook: true
  # CA certificate used by the Kubernetes api server. This field is automatically assigned by the webhook server.
  ca: not-ca-cert
  healthcheck:
    # healthcheck configures the readiness and liveness probes for the webhook server pod.
    enabled: false
    # Probe port served by the controller-runtime manager (HTTP, plain).
    probePort: 8081
  # Port exposed by the controller-runtime webhook server (HTTPS).
  # Matches the default port used by sigs.k8s.io/controller-runtime/pkg/webhook.
  port: 9443
  servingCerts:
    # If true, generates on install/upgrade the certs that allow the kube-apiserver (and potentially ServiceMonitor)
    # to authenticate webhook servers pods. Otherwise specify certs in `apiserver.servingCerts.{caCrt, serverCrt, serverKey}`.
    generate: true
    certManager:
      # If true, cert-manager is used to generate the serving certificate secret.
      enabled: false
      # issuerRef configures the cert-manager Issuer/ClusterIssuer.
      # If name is empty, a self-signed Issuer is created in the release namespace.
      issuerRef:
        name: ""
        kind: Issuer
        group: cert-manager.io
    # CA certficate used by serving certificate of webhook server.
    caCrt: ""
    # Serving certficate used by webhook server.
    serverCrt: ""
    # Private key for the serving certificate used by webhook server.
    serverKey: ""
  webhook:
    failurePolicy: Ignore
monitoring:
  # Name of monitoring agent (one of "prometheus.io", "prometheus.io/operator", "prometheus.io/builtin")
  agent: ""
  # Port the controller-runtime metrics endpoint binds to (plain HTTP).
  bindPort: 8080
  serviceMonitor:
    # Specify the labels for ServiceMonitor.
    # Prometheus crd will select ServiceMonitor using these labels.
    # Only usable when monitoring agent is `prometheus.io/webhook server`.
    labels: {}

distro:
  openshift: false
  ubi: ""

# Settings for the post-install/post-upgrade Job that patches the VaultServer
# CRD's spec.conversion to point at this webhook server. The Job runs once
# per helm install / upgrade and is then garbage-collected.
kubectl:
  # Docker registry used to pull KubeDB enterprise kubectl-nonroot image
  registry: appscode
  # KubeDB enterprise kubectl-nonroot container image
  repository: kubectl-nonroot
  # KubeDB enterprise kubectl-nonroot container image tag
  tag: "1.34"
  # Security options this container should run with
  securityContext:  # +doc-gen:break
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 65534
    seccompProfile:
      type: RuntimeDefault
  # Compute Resources required by the operator container
  resources: {}
  # requests:
  #   cpu: 100m
  #   memory: 128Mi
