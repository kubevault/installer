{{- /*
Single template that renders, in one consistent pass:
  1. the serving-cert Secret (in apiserver.servingCerts.generate mode),
  2. every MutatingWebhookConfiguration / ValidatingWebhookConfiguration that
     points at the kubevault-webhook-server Service.

Why one file? helm's `genCA` / `genSignedCert` are non-deterministic across
template renders, so the CA can only be guaranteed identical when computed
once per `helm template` invocation. Keeping the Secret and every webhook
configuration in the same file means the same `$caCrt` flows everywhere.

cert-manager mode: the Secret is owned by cert-manager (see templates/cert-manager.yaml)
and each webhook configuration carries the cert-manager.io/inject-ca-from-secret
annotation; the controller patches the caBundle field at runtime.
*/ -}}
{{- $fullname := include "kubevault-webhook-server.fullname" . -}}
{{- $conversionCmName := printf "%s-vaultservers-conversion" $fullname | trunc 63 | trimSuffix "-" -}}
{{- $conversionJobName := printf "%s-vaultservers-conversion-patch" $fullname | trunc 63 | trimSuffix "-" -}}
{{- $svcNamespace := .Release.Namespace -}}
{{- $useCertManager := .Values.apiserver.servingCerts.certManager.enabled -}}
{{- $failurePolicy := .Values.apiserver.webhook.failurePolicy -}}

{{- $caCrt := "" -}}
{{- $serverCrt := "" -}}
{{- $serverKey := "" -}}
{{- if not $useCertManager -}}
{{-   if .Values.apiserver.servingCerts.generate -}}
{{-     $ca := genCA "ca" 3650 -}}
{{-     $altName1 := printf "%s.%s" $fullname .Release.Namespace -}}
{{-     $altName2 := printf "%s.%s.svc" $fullname .Release.Namespace -}}
{{-     $server := genSignedCert $fullname nil (list $altName1 $altName2) 3650 $ca -}}
{{-     $caCrt = b64enc $ca.Cert -}}
{{-     $serverCrt = b64enc $server.Cert -}}
{{-     $serverKey = b64enc $server.Key -}}
{{-   else -}}
{{-     $caCrt = required "Required when apiserver.servingCerts.generate is false" .Values.apiserver.servingCerts.caCrt -}}
{{-     $serverCrt = required "Required when apiserver.servingCerts.generate is false" .Values.apiserver.servingCerts.serverCrt -}}
{{-     $serverKey = required "Required when apiserver.servingCerts.generate is false" .Values.apiserver.servingCerts.serverKey -}}
{{-   end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $fullname }}-apiserver-cert
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubevault-webhook-server.labels" . | nindent 4 }}
type: kubernetes.io/tls
data:
  ca.crt: {{ $caCrt }}
  tls.crt: {{ $serverCrt }}
  tls.key: {{ $serverKey }}
---
{{- end }}

{{- /* clientConfig.service block used by every webhook */ -}}
{{- $clientConfigService := dict "namespace" $svcNamespace "name" $fullname -}}

{{- /*
caBundleField returns the YAML snippet for a webhook's caBundle / annotation.
In cert-manager mode we leave caBundle unset and rely on the inject-ca-from-secret
annotation (added at the metadata level below). Otherwise we inline the CA we
just generated.
*/ -}}

{{- /* ---- VaultServer (kubevault.com/v1alpha2) ---- */ -}}
{{- if .Values.apiserver.enableMutatingWebhook }}
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: mutators.kubevault.com
  labels:
    app.kubernetes.io/component: kubevault-core
    {{- include "kubevault-webhook-server.labels" . | nindent 4 }}
  {{- if $useCertManager }}
  annotations:
    cert-manager.io/inject-ca-from-secret: {{ printf "%s/%s-apiserver-cert" $svcNamespace $fullname }}
  {{- end }}
webhooks:
- name: vaultserver.mutators.kubevault.com
  clientConfig:
    service:
      namespace: {{ $svcNamespace }}
      name: {{ $fullname }}
      path: /mutate-kubevault-com-v1alpha2-vaultserver
      port: 443
    {{- if not $useCertManager }}
    caBundle: {{ $caCrt }}
    {{- end }}
  rules:
  - operations: ["CREATE", "UPDATE"]
    apiGroups: ["kubevault.com"]
    apiVersions: ["v1alpha2"]
    resources: ["vaultservers"]
  admissionReviewVersions: ["v1"]
  failurePolicy: {{ $failurePolicy }}
  sideEffects: None
  timeoutSeconds: 10
---
{{- end }}

{{- if .Values.apiserver.enableValidatingWebhook }}
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validators.kubevault.com
  labels:
    app.kubernetes.io/component: kubevault-core
    {{- include "kubevault-webhook-server.labels" . | nindent 4 }}
  {{- if $useCertManager }}
  annotations:
    cert-manager.io/inject-ca-from-secret: {{ printf "%s/%s-apiserver-cert" $svcNamespace $fullname }}
  {{- end }}
webhooks:
- name: vaultserver.validators.kubevault.com
  clientConfig:
    service:
      namespace: {{ $svcNamespace }}
      name: {{ $fullname }}
      path: /validate-kubevault-com-v1alpha2-vaultserver
      port: 443
    {{- if not $useCertManager }}
    caBundle: {{ $caCrt }}
    {{- end }}
  rules:
  - operations: ["CREATE", "UPDATE", "DELETE"]
    apiGroups: ["kubevault.com"]
    apiVersions: ["v1alpha2"]
    resources: ["vaultservers"]
  admissionReviewVersions: ["v1"]
  failurePolicy: {{ $failurePolicy }}
  sideEffects: None
  timeoutSeconds: 10
---
{{- end }}

